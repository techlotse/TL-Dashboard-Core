# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — TL-Dashboard
#
# Pulls a pre-built image from DockerHub. No local build required.
#
# Usage:
#   cp .env.example .env       # configure once
#   docker compose up -d       # start
#   docker compose pull        # update to latest
#   docker compose down        # stop
#
# Open http://localhost:18181 in a browser.
# ─────────────────────────────────────────────────────────────────────────────
name: tl-dashboard

services:
  dashboard:
    image: techlotse/tl-dashboard-core:latest
    restart: unless-stopped
    ports:
      # Dashboard available at http://localhost:18181
      - "18181:3001"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      # ── Background images ─────────────────────────────────────────────────
      # Place your .jpg/.jpeg/.png/.webp photos in ./backgrounds/
      - ./backgrounds:/app/backgrounds:ro

      # ── Google service account key (optional) ─────────────────────────────
      # Uncomment and update the path if using a Google service account JSON:
      # - /path/to/your/service-account-key.json:/run/secrets/google_sa_key.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
