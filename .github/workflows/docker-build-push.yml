# ─────────────────────────────────────────────────────────────────────────────
# CI — Build and push TL-Dashboard Docker image to DockerHub
#
# Triggers:
#   - Push to main branch
#   - Push of any version tag (v*.*.*)
#   - Pull requests against main (build only — no push)
#
# Required GitHub organisation variables (Settings → Variables → Organisation):
#   DOCKER_REPO   — DockerHub image name, e.g. techlotse/tl-dashboard-core
#
# Required GitHub organisation secrets (Settings → Secrets → Organisation):
#   ORG_DOCKERHUB_USER   — DockerHub username
#   ORG_DOCKERHUB_KEY    — DockerHub access token (Read, Write, Delete scope)
#                          Create at: https://hub.docker.com/settings/security
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push to DockerHub

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  IMAGE: ${{ vars.DOCKER_REPO || 'techlotse/tl-dashboard-core' }}
  # Opt in to Node.js 24 runtime for all actions (required from June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.ORG_DOCKERHUB_USER }}
          password: ${{ secrets.ORG_DOCKERHUB_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Lightweight smoke-test on PRs (no push, no secrets needed)
  validate:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: docker compose -f docker-compose.yml config --quiet
